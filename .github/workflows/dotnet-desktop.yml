name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 列出根目录文件（调试用，可删除）
      - name: List files
        run: dir
        shell: pwsh

      # 查找 .csproj 文件（假设只有一个）
      - name: Find project file
        id: find_csproj
        run: |
          $csproj = Get-ChildItem -Filter "*.csproj" -Recurse | Select-Object -First 1
          if ($csproj) {
            echo "project_path=$($csproj.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            echo "No .csproj file found"
            exit 1
          }
        shell: pwsh

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'    # 根据项目实际版本修改

      - name: Restore dependencies
        run: dotnet restore "${{ steps.find_csproj.outputs.project_path }}"
        shell: pwsh

      - name: Publish self-contained app
        run: |
          dotnet publish "${{ steps.find_csproj.outputs.project_path }}" `
            --configuration Release `
            --self-contained true `
            --runtime win-x64 `
            --output ./publish_output `
            -p:PublishSingleFile=true
        shell: pwsh

      - name: Package build artifacts
        run: |
          $outputDir = "publish"
          New-Item -ItemType Directory -Force -Path $outputDir
          Compress-Archive -Path "./publish_output/*" -DestinationPath "$outputDir/InternetRepair.zip" -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InternetRepair
          path: publish/InternetRepair.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: publish/InternetRepair.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
